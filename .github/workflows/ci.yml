name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on router scripts
        run: shellcheck -s sh router/update_script.sh router/bootstrap.sh
      - name: Run shellcheck on server scripts
        run: shellcheck -s bash scripts/install_core.sh install.sh

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check bot.py syntax
        run: python -m py_compile bot/bot.py
